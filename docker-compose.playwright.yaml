# Mock-only stack for the Playwright e2e suite.
services:
  grafana:
    extends:
      file: docker-compose-defaults.yaml
      service: grafana
    container_name: 'grafana-logsapp'
    build:
      context: ./.config
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana}
    extra_hosts:
      # Mocks intercept all data-source HTTP traffic so this isn't strictly
      # required, but the provisioned datasources reference host.docker.internal
      # — keeping it avoids name-resolution warnings at startup.
      - 'host.docker.internal:172.17.0.1'
