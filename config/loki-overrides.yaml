configs:
  '1':
    log_push_request: false
    log_push_request_streams: false
  '2':
    log_push_request: false
    log_push_request_streams: false
overrides:
  '1':
    allow_structured_metadata: true
    pattern_persistence_enabled: true
    volume_enabled: true
    retention_period: 30d
    max_query_length: 0d
    # Allow the static-data e2e generator (pnpm run generate:loki-snapshot)
    # to push samples timestamped 2026-04-26, even when the snapshot is
    # rebuilt months later. Loki's default rejects samples older than 7d.
    reject_old_samples: false
  '2':
    allow_structured_metadata: true
    pattern_persistence_enabled: false
    volume_enabled: true
    retention_period: 30d
    max_query_length: 7d
    max_query_bytes_read: 200MB
