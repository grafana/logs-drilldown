packages:
  - '.'

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  protobufjs: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@grafana/scenes-react@8.9.0'
  - '@grafana/scenes@8.9.0'

overrides:
  react-router-dom: 7.18.0
  uuid: 14.0.1
  immutable: 5.1.8
  dompurify: 3.4.11
  serialize-javascript: 7.0.6
  strip-ansi: 6.0.1
  js-yaml: 4.3.0
  # Security patches for transitive vulnerabilities (pnpm audit)
  fast-uri: 3.1.2
  protobufjs: 8.6.5
  js-cookie: 3.0.8
  '@ungap/structured-clone': 1.3.2
  'brace-expansion@^5': 5.0.6
  'ws@^8': 8.21.0
  'ws@>=7.0.0 <7.5.11': 7.5.11
  qs: 6.15.3
  '@babel/core@<=7.29.0': 7.29.7
  '@opentelemetry/core@<2.8.0': 2.8.0
  tar@<=7.5.15: 7.5.19
  webpack: 5.108.1
