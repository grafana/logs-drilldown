packages:
  - '.'

# https://pnpm.io/supply-chain-security
# Same as passing --frozen-lockfile on every pnpm install (CI uses this via plugin-ci-workflows too).
frozenLockfile: true
# Disable package lifecycle scripts (postinstall, etc.) on install.
ignoreScripts: true
# Five days in minutes (5 × 24 × 60).
minimumReleaseAge: 7200
# Fail install if a package's trust evidence is weaker than an earlier release (e.g. lost trusted publisher).
trustPolicy: no-downgrade
# Transitive deps must come from the registry/workspace; block git/tarball URLs except on direct deps.
blockExoticSubdeps: true
# Requires every dependency with a lifecycle script to be listed in allowBuilds
strictDepBuilds: true

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  protobufjs: true
  unrs-resolver: true

overrides:
  react-router-dom: 7.18.0
  uuid: 14.0.1
  immutable: 5.1.8
  dompurify: 3.4.11
  serialize-javascript: 7.0.6
  strip-ansi: 6.0.1
  js-yaml: 4.3.0
  # Security patches for transitive vulnerabilities (pnpm audit)
  fast-uri: 3.1.2
  protobufjs: 8.6.5
  js-cookie: 3.0.8
  '@ungap/structured-clone': 1.3.2
  'brace-expansion@<1.1.16': 1.1.16
  'brace-expansion@>=2.0.0 <2.1.2': 2.1.2
  'brace-expansion@^5': 5.0.7
  'ws@^8': 8.21.0
  'ws@>=7.0.0 <7.5.11': 7.5.11
  qs: 6.15.3
  '@babel/core@<=7.29.0': 7.29.7
  '@opentelemetry/core@<2.8.0': 2.8.0
  tar@<=7.5.15: 7.5.19
  webpack: 5.108.1
  'websocket-driver@<0.7.5': 0.7.5
