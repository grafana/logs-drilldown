services:
  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    ports: !override
      - 3001:3000/tcp
    environment:
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_BASIC_ENABLED: false
      GF_SERVER_SERVE_FROM_SUB_PATH: true
      GF_SERVER_ROOT_URL: http://localhost:3001/grafana
      GF_PLUGINS_PREINSTALL_DISABLED: true
      GF_FEATURE_TOGGLES_ENABLE: accessControlOnCall lokiLogsDataplane kubernetesLogsDrilldown localizationForPlugins ${GF_FEATURE_TOGGLES_ENABLE}
      GRAFANA_CLOUD_LOGS_KEY: ${GRAFANA_CLOUD_LOGS_KEY}

      # Reduce SQLITE_BUSY contention at startup. On Grafana 13.0.1 the
      # advisor app's apiserver bootstrap (POSTs to
      # /apis/advisor.grafana.app/v0alpha1/.../checktypes) and the legacy
      # provisioning subsystem both write to the same SQLite file, and the
      # advisor's write transaction self-deadlocks against the rebuild reads
      # that the unified storage migration issues on a separate connection
      # (see grafana/grafana#122993, fixed in 13.0.2 by grafana/grafana#123034).
      # The deadlock is not resolvable by busy_timeout, so we disable the
      # advisor outright in CI -- E2E tests don't need it. WAL + a longer
      # busy timeout are kept as defense-in-depth for any other apiserver
      # subsystem that may write during startup.
      #
      # CASE MATTERS: applyFeatureToggleEnvOverrides
      # (pkg/setting/setting_feature_toggles.go) strips the GF_FEATURE_TOGGLES_
      # prefix and uses the rest verbatim as a case-sensitive ini key. The
      # registered flag is `grafanaAdvisor` (registry.go), so an uppercase
      # GF_FEATURE_TOGGLES_GRAFANAADVISOR registers a different (unknown)
      # toggle and the advisor stays on. Quote the value too -- bare `false`
      # is YAML boolean false and Docker Compose can hand it to the container
      # as an empty string, which the override code skips entirely.
      GF_FEATURE_TOGGLES_grafanaAdvisor: 'false'
      GF_DATABASE_WAL: true
      GF_DATABASE_LOCKING_ATTEMPT_TIMEOUT_SEC: 30
