name: Build Generator

on:
  push:
    branches:
      - main
    paths:
      - 'generator/**/*'
  pull_request:
    paths:
      - 'generator/**/*'

# These permissions are needed to assume roles from Github's OIDC.
permissions:
  contents: read
  id-token: write

env:
  TAGS_CONFIG: |
    type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
    type=sha,prefix={{ branch }}-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
    type=semver,pattern={{ version }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: grafana/shared-workflows/actions/docker-build-push-image@e288f43e2954fe65ce3dadfcc418dacb638cf7e1 # main
        name: Build and push
        with:
          registries: gar
          gar-registry: 'us-docker.pkg.dev'
          gar-image: 'fake-log-generator'
          gar-environment: 'prod'
          tags: ${{ env.TAGS_CONFIG }}
          context: ./generator/
          push: ${{ github.event_name == 'push' }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            OTLP_ENDPOINT=http://localhost:3100/otlp
